<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Página não encontrada | BR Depressão</title>
    <link rel="icon" href="./bdd.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            --dark-bg: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.9);
            --card-border: rgba(59, 130, 246, 0.2);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.1) 0%, transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating Elements Animation */
        .floating {
            position: fixed;
            pointer-events: none;
            opacity: 0.3;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .floating-1 {
            top: 10%;
            left: 5%;
            font-size: 3rem;
            animation-delay: 0s;
        }

        .floating-2 {
            bottom: 15%;
            right: 8%;
            font-size: 4rem;
            animation-delay: 1s;
            animation-direction: reverse;
        }

        .floating-3 {
            top: 50%;
            left: 85%;
            font-size: 2.5rem;
            animation-delay: 2s;
        }

        .floating-4 {
            bottom: 30%;
            left: 10%;
            font-size: 2rem;
            animation-delay: 0.5s;
            animation-direction: reverse;
        }

        .floating-5 {
            top: 70%;
            right: 15%;
            font-size: 1.8rem;
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) rotate(0deg); 
            }
            50% { 
                transform: translateY(-20px) rotate(5deg); 
            }
        }

        /* Main Container */
        .error-container {
            position: relative;
            z-index: 2;
            max-width: 550px;
            margin: 2rem;
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error Card */
        .error-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .error-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.4);
        }

        /* Status Code */
        .status-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--danger));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            }
            50% {
                opacity: 0.9;
                text-shadow: 0 0 50px rgba(239, 68, 68, 0.4);
            }
        }

        /* Message */
        .error-message {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .error-message i {
            color: var(--danger);
            font-size: 1.75rem;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .highlight {
            color: var(--primary);
            font-style: italic;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--warning));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Description */
        .error-description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Image Container */
        .image-container {
            margin: 1.5rem 0;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .image-container:hover {
            transform: scale(1.02);
        }

        .error-image {
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
            transition: filter 0.3s ease;
        }

        .error-image:hover {
            filter: drop-shadow(0 6px 16px rgba(59, 130, 246, 0.3));
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.875rem;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #DC2626);
            color: white;
            border: none;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        /* Funny Football Stats */
        .fun-stats {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            color: var(--text-secondary);
            transform: translateY(-2px);
        }

        .stat-item i {
            font-size: 0.875rem;
        }

        /* Roulette Button */
        .roulette-trigger {
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }

        .roulette-trigger:hover {
            color: var(--warning);
            background: rgba(245, 158, 11, 0.1);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .error-container {
                margin: 1rem;
            }
            .error-card {
                padding: 1.5rem;
            }
            .status-code {
                font-size: 5rem;
            }
            .error-message {
                font-size: 1.25rem;
            }
            .actions {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
            .floating {
                display: none;
            }
            .fun-stats {
                gap: 0.75rem;
            }
            .stat-item {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Icons for Fun -->
    <div class="floating floating-1">
        <i class="fas fa-futbol"></i>
    </div>
    <div class="floating floating-2">
        <i class="fas fa-trophy"></i>
    </div>
    <div class="floating floating-3">
        <i class="fas fa-chart-line"></i>
    </div>
    <div class="floating floating-4">
        <i class="fas fa-shield-alt"></i>
    </div>
    <div class="floating floating-5">
        <i class="fas fa-whistle"></i>
    </div>

    <div class="error-container">
        <div class="error-card">
            <div class="status-code">404</div>
            <div class="error-message">
                <i class="fas fa-frown"></i>
                <span>Página foi de <span class="highlight">Elton</span></span>
                <i class="fas fa-futbol"></i>
            </div>
            <div class="error-description">
                <i class="fas fa-flag-checkered"></i> Opa! Parece que essa página deu uma saída de campo precoce.<br>
                Nem o VAR conseguiu encontrar o que você procurava. ⚽
            </div>

            <!-- Image Container - ad1.png -->
            <div class="image-container">
                <img src="ad1.png" alt="Elton sumiu!" class="error-image" onerror="this.src='https://placehold.co/400x250/1E293B/3B82F6?text=⚽+ELTON+SUMIMOS+⚽'">
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <a href="home.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Voltar para o Início
                </a>
                <a href="javascript:history.back()" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
                <button class="btn btn-danger" id="roulette-btn">
                    <i class="fas fa-dice-d6"></i> Roleta Russa 🎲
                </button>
            </div>

            <!-- Fun Stats -->
            <div class="fun-stats">
                <div class="stat-item">
                    <i class="fas fa-clock"></i>
                    <span>Erro registrado em: <span id="current-time"></span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-chart-simple"></i>
                    <span>Taxa de acerto: 0%</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-futbol"></i>
                    <span>Gols perdidos: <span id="goals-lost">+1</span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-dice"></i>
                    <span>Erros consecutivos: <span id="error-count">0</span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase e lógica da roleta russa -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // Configuração da Roleta Russa
        const rouletteLinks = [
            "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
            "https://ge.globo.com",
            "https://videos.adventistas.org/pt/editoria/biblia/dizimos-ofertas-igreja-adventista-setimo-dia/",
            "https://churchofsatan.com/",
            "https://www.xvideos.com/?k=porno+gay",
            "https://www.youtube.com/watch?v=4d6Chp0HISg",
            "https://www.facebook.com/naassom.mendes",
            "https://guiadoestudante.abril.com.br/wp-content/uploads/sites/4/2019/06/massacre-da-prac3a7a-da-paz-celestial-completa-30-anos.png?w=414&h=280&crop=1",
            "https://kcnawatch.org/korea-central-tv-livestream/",
            "https://www.transfermarkt.com.br/hakan-calhanoglu/profil/spieler/126414"
        ];

        // Função da roleta russa
        function playRoulette() {
            // Escolhe um link aleatório da lista
            const randomIndex = Math.floor(Math.random() * rouletteLinks.length);
            const randomLink = rouletteLinks[randomIndex];
            
            // Redireciona para o link aleatório
            window.location.href = randomLink;
        }

        // Adiciona o evento de clique na imagem
        const errorImage = document.querySelector('.error-image');
        if (errorImage) {
            errorImage.style.cursor = 'pointer';
            errorImage.addEventListener('click', playRoulette);
        }
    </script>
</body>
</html>
