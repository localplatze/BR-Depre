<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Palpites - BR Depressão</title>
    <link rel="icon" href="./bdd.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --dark-bg: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.9);
            --card-border: rgba(59, 130, 246, 0.2);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header h1 i {
            color: var(--primary);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
            padding: 0.6rem 1.25rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Timer Card */
        .timer-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            backdrop-filter: blur(10px);
        }

        .timer-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
        }

        .timer-info i {
            font-size: 1.25rem;
            color: var(--warning);
        }

        .timer-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 0.5rem;
            border: 1px solid var(--card-border);
        }

        .tab {
            flex: 1;
            padding: 0.75rem 1rem;
            text-align: center;
            background: none;
            border: none;
            border-radius: 0.75rem;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab:hover:not(.active) {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        /* Matches Grid */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.25rem;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .match-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .match-card.locked {
            opacity: 0.7;
        }

        .match-card.locked:hover {
            transform: none;
        }

        .match-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .lock-icon {
            color: var(--warning);
        }

        .match-body {
            padding: 1.5rem;
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .team-name {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .vs {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 600;
            padding: 0 0.75rem;
        }

        .final-result {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.75rem;
        }

        .prediction-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        .score-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.75rem;
            padding: 0.25rem;
        }

        .score-btn {
            width: 32px;
            height: 32px;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .score-btn:hover:not(:disabled) {
            background: var(--primary);
        }

        .score-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .score-input {
            width: 50px;
            height: 40px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            background: transparent;
            border: none;
            color: var(--text-primary);
            -moz-appearance: textfield;
        }

        .score-input::-webkit-outer-spin-button,
        .score-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .score-input:focus {
            outline: none;
        }

        .score-input:disabled {
            color: var(--text-secondary);
        }

        .match-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--card-border);
            text-align: center;
        }

        .view-predictions {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .view-predictions:hover {
            color: var(--primary);
        }

        /* Save Button */
        .save-container {
            position: sticky;
            bottom: 1rem;
            margin-top: 2rem;
            text-align: center;
            z-index: 100;
        }

        .save-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-md);
        }

        .save-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .save-btn.has-changes {
            background: linear-gradient(135deg, var(--warning), #d97706);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* Loader */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            gap: 0.75rem;
            color: var(--text-secondary);
        }

        .loader i {
            font-size: 1.5rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Dialog */
        dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 800px;
            padding: 0;
            margin: 0;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            z-index: 1000;
        }

        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        .dialog-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .dialog-content {
            padding: 1.5rem;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* Predictions List */
        .predictions-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .prediction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.75rem;
            border-left: 4px solid transparent;
        }

        .prediction-item.points-3 { border-left-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .prediction-item.points-1 { border-left-color: var(--warning); background: rgba(245, 158, 11, 0.1); }
        .prediction-item.points-0 { border-left-color: var(--text-muted); }
        .prediction-item.points--1 { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .prediction-player {
            font-weight: 500;
            flex: 1;
        }

        .prediction-score {
            font-weight: 600;
            margin: 0 1rem;
        }

        .prediction-points {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
        }

        .prediction-points.points-3 { background: var(--success); }
        .prediction-points.points-1 { background: var(--warning); color: #000; }
        .prediction-points.points-0 { background: var(--text-muted); }
        .prediction-points.points--1 { background: var(--danger); }

        /* Player Status Table */
        .status-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        .status-table th,
        .status-table td {
            padding: 0.75rem 0.5rem;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
        }

        .status-table th:first-child,
        .status-table td:first-child {
            text-align: left;
            font-weight: 500;
        }

        .status-table tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .points-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .points-3-badge { background: var(--success); }
        .points-1-badge { background: var(--warning); color: #000; }
        .points--1-badge { background: var(--danger); }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--card-border);
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            .matches-grid {
                grid-template-columns: 1fr;
            }
            .team-logo {
                width: 45px;
                height: 45px;
            }
            .team-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-futbol"></i> Próxima Rodada</h1>
            <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar</a>
        </div>

        <div class="timer-card" id="timer-container">
            <div class="timer-info">
                <i class="fas fa-hourglass-half"></i>
                <span>Carregando...</span>
            </div>
        </div>

        <div class="tabs">
            <button id="matches-tab" class="tab active"><i class="fas fa-futbol"></i> Jogos</button>
            <button id="player-status-tab" class="tab"><i class="fas fa-users"></i> Status</button>
        </div>

        <div id="loader" class="loader"><i class="fas fa-spinner fa-pulse"></i> Carregando jogos...</div>
        <div id="matches-container" class="matches-grid" style="display: none;"></div>

        <div class="save-container">
            <button id="save-predictions" class="save-btn" disabled><i class="fas fa-save"></i> Salvar Palpites</button>
        </div>
    </div>

    <!-- Dialogs -->
    <dialog id="player-status-dialog">
        <div class="dialog-header">
            <h2><i class="fas fa-clipboard-list"></i> Status dos Palpites</h2>
            <button class="close-btn">×</button>
        </div>
        <div class="dialog-content">
            <div style="overflow-x: auto;">
                <table class="status-table" id="status-table">
                    <thead id="status-header"></thead>
                    <tbody id="status-body"></tbody>
                </table>
            </div>
            <div class="legend">
                <div class="legend-item"><span class="legend-color" style="background: var(--success);"></span> 3 pts (Placar Exato)</div>
                <div class="legend-item"><span class="legend-color" style="background: var(--warning);"></span> 1 pt (Vencedor/Empate)</div>
                <div class="legend-item"><span class="legend-color" style="background: var(--text-muted);"></span> 0 pts (Errou)</div>
                <div class="legend-item"><span class="legend-color" style="background: var(--danger);"></span> -1 pt (Placar Invertido)</div>
                <div class="legend-item"><i class="fas fa-futbol"></i> Palpite Feito</div>
                <div class="legend-item"><i class="fas fa-question-circle"></i> Não Palpitou</div>
            </div>
        </div>
    </dialog>

    <dialog id="predictions-dialog">
        <div class="dialog-header">
            <h2 id="predictions-title"><i class="fas fa-eye"></i> Palpites do Jogo</h2>
            <button class="close-btn">×</button>
        </div>
        <div class="dialog-content">
            <div id="predictions-list" class="predictions-list"></div>
        </div>
    </dialog>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBBrIiwL2sUVEPc8YBzdkJxPVyVVC5QN1M",
            authDomain: "brdepre.firebaseapp.com",
            databaseURL: "https://brdepre-default-rtdb.firebaseio.com",
            projectId: "brdepre",
            storageBucket: "brdepre.firebasestorage.app",
            messagingSenderId: "1077826896098",
            appId: "1:1077826896098:web:abe2b07a280a4852649ebb",
            measurementId: "G-4JXFEZ8DW6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentRoundKey = null;
        let allPlayers = {};
        let allTeams = {};
        let allMatches = {};
        let roundFinishTimestamp = null;
        let unsavedPredictions = {};
        let countdownInterval;

        // DOM Elements
        const matchesContainer = document.getElementById('matches-container');
        const timerContainer = document.getElementById('timer-container');
        const saveBtn = document.getElementById('save-predictions');
        const loader = document.getElementById('loader');
        const matchesTab = document.getElementById('matches-tab');
        const statusTab = document.getElementById('player-status-tab');
        const statusDialog = document.getElementById('player-status-dialog');
        const predictionsDialog = document.getElementById('predictions-dialog');

        // Storage helpers
        function getDraftKey() {
            return `predictions_${auth.currentUser?.uid}_${currentRoundKey}`;
        }

        function saveDraft() {
            if (currentRoundKey && auth.currentUser) {
                localStorage.setItem(getDraftKey(), JSON.stringify(unsavedPredictions));
            }
        }

        function loadDraft() {
            if (currentRoundKey && auth.currentUser) {
                const draft = localStorage.getItem(getDraftKey());
                unsavedPredictions = draft ? JSON.parse(draft) : {};
            }
        }

        function clearDraft() {
            if (currentRoundKey && auth.currentUser) {
                localStorage.removeItem(getDraftKey());
            }
        }

        function updateSaveButton() {
            const hasChanges = Object.keys(unsavedPredictions).length > 0;
            saveBtn.disabled = !hasChanges;
            if (hasChanges) {
                saveBtn.classList.add('has-changes');
                saveBtn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Salvar Alterações';
            } else {
                saveBtn.classList.remove('has-changes');
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Salvar Palpites';
            }
        }

        function calculateMatchPoints(final, pred) {
            if (!final || final.homeScore === undefined || !pred || pred.homeScore === undefined) return null;
            if (final.homeScore === pred.homeScore && final.awayScore === pred.awayScore) return 3;
            const finalWinner = Math.sign(final.homeScore - final.awayScore);
            const predWinner = Math.sign(pred.homeScore - pred.awayScore);
            if (finalWinner === predWinner) return 1;
            if (final.homeScore === pred.awayScore && final.awayScore === pred.homeScore) return -1;
            return 0;
        }

        async function fetchData() {
            const [usersSnap, teamsSnap] = await Promise.all([
                database.ref('users').once('value'),
                database.ref('teams').once('value')
            ]);
            allPlayers = usersSnap.val() || {};
            allTeams = teamsSnap.val() || {};
        }

        async function loadRound() {
            const roundSnap = await database.ref('rounds').orderByChild('status').equalTo(1).limitToFirst(1).once('value');
            if (!roundSnap.exists()) {
                timerContainer.innerHTML = '<div class="timer-info"><i class="fas fa-info-circle"></i><span>Nenhuma rodada ativa</span></div>';
                matchesContainer.innerHTML = '<div class="loader"><i class="fas fa-calendar-times"></i> Aguarde a próxima rodada</div>';
                saveBtn.style.display = 'none';
                return false;
            }

            roundSnap.forEach(child => {
                currentRoundKey = child.key;
                const roundData = child.val();
                allMatches = roundData.matches || [];
                roundFinishTimestamp = roundData.finishTimestamp;
            });
            return true;
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            const updateTimer = () => {
                const now = new Date().getTime();
                const diff = roundFinishTimestamp - now;
                
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    timerContainer.innerHTML = '<div class="timer-info"><i class="fas fa-clock"></i><span>Tempo esgotado!</span></div>';
                    saveBtn.style.display = 'none';
                } else {
                    const hours = Math.floor(diff / 3600000);
                    const minutes = Math.floor((diff % 3600000) / 60000);
                    timerContainer.innerHTML = `
                        <div class="timer-info"><i class="fas fa-hourglass-half"></i><span>Prazo para palpites</span></div>
                        <div class="timer-value"><i class="fas fa-clock"></i> ${hours}h ${minutes}m restantes</div>
                    `;
                }
            };
            updateTimer();
            countdownInterval = setInterval(updateTimer, 60000);
        }

        function isMatchLocked(match) {
            const now = new Date().getTime();
            const deadline = match.timestamp ? new Date(match.timestamp).getTime() : roundFinishTimestamp;
            return now >= deadline;
        }

        function renderMatches(userId) {
            if (!allMatches.length) {
                matchesContainer.innerHTML = '<div class="loader"><i class="fas fa-info-circle"></i> Nenhum jogo disponível</div>';
                return;
            }

            matchesContainer.innerHTML = allMatches.map((match, idx) => {
                const homeTeam = allTeams[match.homeTeam] || { name: '?', image: '' };
                const awayTeam = allTeams[match.awayTeam] || { name: '?', image: '' };
                const savedPred = match.predictions?.[userId] || {};
                const unsaved = unsavedPredictions[idx];
                const homeScore = unsaved?.homeScore ?? savedPred.homeScore ?? '';
                const awayScore = unsaved?.awayScore ?? savedPred.awayScore ?? '';
                const isLocked = isMatchLocked(match);
                const hasResult = match.finalResult;

                return `
                    <div class="match-card ${isLocked ? 'locked' : ''}" data-match-id="${idx}">
                        <div class="match-header">
                            <span><i class="far fa-calendar-alt"></i> ${new Date(match.timestamp).toLocaleDateString('pt-BR')}</span>
                            <span><i class="far fa-clock"></i> ${new Date(match.timestamp).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
                            ${isLocked && !hasResult ? '<i class="fas fa-lock lock-icon"></i>' : ''}
                        </div>
                        <div class="match-body">
                            <div class="teams">
                                <div class="team">
                                    <img src="${homeTeam.image || ''}" class="team-logo" onerror="this.src='default-avatar.png'">
                                    <div class="team-name">${homeTeam.name}</div>
                                </div>
                                <div class="vs">VS</div>
                                <div class="team">
                                    <img src="${awayTeam.image || ''}" class="team-logo" onerror="this.src='default-avatar.png'">
                                    <div class="team-name">${awayTeam.name}</div>
                                </div>
                            </div>
                            ${hasResult ? `
                                <div class="final-result">
                                    ${match.finalResult.homeScore} : ${match.finalResult.awayScore}
                                </div>
                            ` : `
                                <div class="prediction-inputs">
                                    <div class="score-control">
                                        <button class="score-btn dec" data-match="${idx}" data-team="home" ${isLocked ? 'disabled' : ''}>-</button>
                                        <input type="number" class="score-input" data-match="${idx}" data-team="home" value="${homeScore}" placeholder="-" ${isLocked ? 'disabled' : ''}>
                                        <button class="score-btn inc" data-match="${idx}" data-team="home" ${isLocked ? 'disabled' : ''}>+</button>
                                    </div>
                                    <span style="color: var(--text-muted);">×</span>
                                    <div class="score-control">
                                        <button class="score-btn dec" data-match="${idx}" data-team="away" ${isLocked ? 'disabled' : ''}>-</button>
                                        <input type="number" class="score-input" data-match="${idx}" data-team="away" value="${awayScore}" placeholder="-" ${isLocked ? 'disabled' : ''}>
                                        <button class="score-btn inc" data-match="${idx}" data-team="away" ${isLocked ? 'disabled' : ''}>+</button>
                                    </div>
                                </div>
                            `}
                        </div>
                        ${isLocked && !hasResult ? `
                            <div class="match-footer">
                                <button class="view-predictions" data-match="${idx}"><i class="fas fa-eye"></i> Ver palpites dos jogadores</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            // Event listeners for inputs
            document.querySelectorAll('.score-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const matchId = input.dataset.match;
                    const team = input.dataset.team;
                    const homeInput = document.querySelector(`.score-input[data-match="${matchId}"][data-team="home"]`);
                    const awayInput = document.querySelector(`.score-input[data-match="${matchId}"][data-team="away"]`);
                    const homeVal = homeInput.value;
                    const awayVal = awayInput.value;
                    
                    if (homeVal.trim() !== '' || awayVal.trim() !== '') {
                        unsavedPredictions[matchId] = { homeScore: homeVal, awayScore: awayVal };
                    } else {
                        delete unsavedPredictions[matchId];
                    }
                    saveDraft();
                    updateSaveButton();
                });
            });

            document.querySelectorAll('.score-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const matchId = btn.dataset.match;
                    const team = btn.dataset.team;
                    const input = document.querySelector(`.score-input[data-match="${matchId}"][data-team="${team}"]`);
                    let val = parseInt(input.value) || 0;
                    if (btn.classList.contains('inc')) val++;
                    else if (btn.classList.contains('dec') && val > 0) val--;
                    input.value = val;
                    input.dispatchEvent(new Event('input'));
                });
            });

            document.querySelectorAll('.view-predictions').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const matchId = parseInt(btn.dataset.match);
                    await showPredictions(matchId);
                });
            });
        }

        async function showPredictions(matchId) {
            const match = allMatches[matchId];
            const homeTeam = allTeams[match.homeTeam]?.name || 'Time A';
            const awayTeam = allTeams[match.awayTeam]?.name || 'Time B';
            document.getElementById('predictions-title').innerHTML = `<i class="fas fa-eye"></i> ${homeTeam} vs ${awayTeam}`;
            
            const predictions = match.predictions || {};
            const list = Object.entries(predictions).map(([pid, pred]) => {
                const player = allPlayers[pid] || { name: 'Desconhecido' };
                const points = calculateMatchPoints(match.finalResult, pred);
                return { ...player, ...pred, points };
            }).sort((a, b) => (b.points || -999) - (a.points || -999));
            
            const container = document.getElementById('predictions-list');
            container.innerHTML = list.map(p => {
                const pointsClass = p.points !== null ? `points-${String(p.points).replace('-', '-1')}` : 'points-0';
                return `
                    <div class="prediction-item ${pointsClass}">
                        <span class="prediction-player">${p.name}</span>
                        <span class="prediction-score">${p.homeScore} × ${p.awayScore}</span>
                        <div class="prediction-points ${pointsClass}">${p.points !== null ? p.points : '-'}</div>
                    </div>
                `;
            }).join('') || '<div style="text-align:center; padding:1rem;">Nenhum palpite para este jogo</div>';
            
            predictionsDialog.showModal();
        }

        function showStatusDialog() {
            if (!allMatches.length) return;
            
            const headerRow = document.getElementById('status-header');
            const body = document.getElementById('status-body');
            
            headerRow.innerHTML = '<th>Jogador</th>' + allMatches.map((m, i) => {
                const home = allTeams[m.homeTeam]?.abbr || '?';
                const away = allTeams[m.awayTeam]?.abbr || '?';
                return `<th>${home}×${away}</th>`;
            }).join('');
            
            body.innerHTML = Object.entries(allPlayers).map(([pid, player]) => {
                let row = `<tr><td style="text-align:left;">${player.name}</td>`;
                allMatches.forEach(match => {
                    const pred = match.predictions?.[pid];
                    if (pred) {
                        if (match.finalResult) {
                            const points = calculateMatchPoints(match.finalResult, pred);
                            let badgeClass = '';
                            if (points === 3) badgeClass = 'points-3-badge';
                            else if (points === 1) badgeClass = 'points-1-badge';
                            else if (points === -1) badgeClass = 'points--1-badge';
                            row += `<td><span class="points-badge ${badgeClass}">${pred.homeScore}×${pred.awayScore}<br>${points}pts</span>`;
                        } else {
                            row += `<td><i class="fas fa-futbol" style="color: var(--primary);" title="${pred.homeScore}×${pred.awayScore}"></i>`;
                        }
                    } else {
                        row += `<td><i class="fas fa-question-circle" style="color: var(--text-muted);"></i>`;
                    }
                    row += '</td>';
                });
                row += '</tr>';
                return row;
            }).join('');
            
            statusDialog.showModal();
        }

        async function savePredictions(userId) {
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Salvando...';
            
            try {
                const updates = {};
                for (const [matchId, pred] of Object.entries(unsavedPredictions)) {
                    if (pred.homeScore.trim() !== '' && pred.awayScore.trim() !== '') {
                        updates[`/rounds/${currentRoundKey}/matches/${matchId}/predictions/${userId}`] = {
                            homeScore: parseInt(pred.homeScore),
                            awayScore: parseInt(pred.awayScore)
                        };
                    }
                }
                
                if (Object.keys(updates).length > 0) {
                    await database.ref().update(updates);
                    unsavedPredictions = {};
                    clearDraft();
                    saveBtn.innerHTML = '<i class="fas fa-check"></i> Salvo com sucesso!';
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                } else {
                    saveBtn.innerHTML = '<i class="fas fa-info-circle"></i> Nada para salvar';
                    setTimeout(updateSaveButton, 2000);
                }
            } catch (error) {
                saveBtn.innerHTML = '<i class="fas fa-times"></i> Erro ao salvar';
                setTimeout(updateSaveButton, 2000);
            }
        }

        async function init() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            await fetchData();
            const hasRound = await loadRound();
            if (!hasRound) {
                loader.style.display = 'none';
                return;
            }
            
            loadDraft();
            startCountdown();
            renderMatches(user.uid);
            updateSaveButton();
            
            loader.style.display = 'none';
            matchesContainer.style.display = 'grid';
            
            saveBtn.onclick = () => savePredictions(user.uid);
            matchesTab.onclick = () => { matchesTab.classList.add('active'); statusTab.classList.remove('active'); };
            statusTab.onclick = () => { statusTab.classList.add('active'); matchesTab.classList.remove('active'); showStatusDialog(); };
            
            document.querySelectorAll('.close-btn').forEach(btn => {
                btn.onclick = () => btn.closest('dialog')?.close();
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) init();
            else window.location.href = 'index.html';
        });
    </script>
</body>
</html>
